<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darija Mastery — Ton appel de sélection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#006233;
    --green-deep:#024d29;
    --terracotta:#C4622D;
    --cream:#F5F0E8;
    --cream-2:#EFE7D8;
    --gold:#D4A853;
    --ink:#2D2D2D;
    --ink-soft:#5a554d;
    --line:rgba(45,45,45,.12);
    --shadow:0 24px 60px -28px rgba(45,45,45,.35);
    --shadow-sm:0 10px 30px -18px rgba(45,45,45,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Plus Jakarta Sans",system-ui,sans-serif;
    background:var(--cream);color:var(--ink);
    line-height:1.6;-webkit-font-smoothing:antialiased;
    min-height:100vh;display:flex;flex-direction:column;
  }
  h1,h2,h3{font-family:"Sora",sans-serif;line-height:1.15;letter-spacing:-.02em;font-weight:700}
  .ar{font-family:"Reem Kufi",sans-serif;direction:rtl;font-weight:500}
  ::selection{background:var(--green);color:var(--cream)}

  .top{display:flex;align-items:center;justify-content:center;gap:14px;padding:18px 20px;border-bottom:1px solid var(--line);background:rgba(245,240,232,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:.55rem;font-family:"Sora";font-weight:800;font-size:1.08rem;letter-spacing:-.02em}
  .brand .mark{width:32px;height:32px;border-radius:10px;background:var(--green);display:grid;place-items:center;box-shadow:inset 0 0 0 1.5px rgba(212,168,83,.55)}
  .brand .mark svg{width:18px;height:18px}
  .brand .ar{color:var(--terracotta);font-size:.9rem}

  .progress{position:sticky;top:69px;z-index:19;background:var(--cream);padding:14px 22px 0}
  .pbar{max-width:600px;margin:0 auto;height:7px;background:var(--cream-2);border-radius:999px;overflow:hidden;border:1px solid var(--line)}
  .pbar i{display:block;height:100%;width:0;background:var(--green);border-radius:999px;transition:width .45s cubic-bezier(.4,0,.2,1)}
  .pmeta{max-width:600px;margin:.5rem auto 0;display:flex;justify-content:space-between;font-size:.76rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft)}

  main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:30px 22px 70px}
  .quiz{width:100%;max-width:600px}

  /* intro above the form */
  .intro{background:#fff;border:1px solid var(--line);border-left:4px solid var(--terracotta);border-radius:14px;
    padding:18px 20px;margin-bottom:28px;box-shadow:var(--shadow-sm)}
  .intro.hide{display:none}
  .intro .it{font-family:"Sora";font-weight:700;font-size:1.02rem;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
  .intro .it .ar{color:var(--terracotta);font-size:1.05rem}
  .intro p{font-size:.95rem;color:var(--ink-soft);margin:0}

  .step{display:none;animation:fade .4s ease}
  .step.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .kicker{font-size:.72rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--terracotta);margin-bottom:.9rem}
  .q{font-size:clamp(1.5rem,4.5vw,2.05rem);font-weight:700;margin-bottom:1.5rem}
  .q .ar{color:var(--green);font-size:.85em;margin-inline-start:.3rem}

  .opts{display:flex;flex-direction:column;gap:12px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    border-radius:15px;padding:1.05rem 1.15rem;font-family:"Plus Jakarta Sans";font-size:1.05rem;font-weight:600;color:var(--ink);
    cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .12s,background .18s}
  .opt:hover{border-color:var(--green);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .opt .tick{flex:none;width:26px;height:26px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;transition:.18s}
  .opt .tick svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:.18s}
  .opt.sel{border-color:var(--green);background:rgba(0,98,51,.05);box-shadow:0 0 0 3px rgba(0,98,51,.1)}
  .opt.sel .tick{background:var(--green);border-color:var(--green)}
  .opt.sel .tick svg{opacity:1;transform:scale(1)}

  .otherwrap{margin-top:12px;display:none}
  .otherwrap.show{display:block}
  .otherwrap textarea{width:100%;font-family:"Plus Jakarta Sans";font-size:1.02rem;padding:.9rem 1.05rem;background:#fff;
    border:1.5px solid var(--line);border-radius:13px;color:var(--ink);outline:none;resize:vertical;min-height:84px;transition:border-color .2s,box-shadow .2s}
  .otherwrap textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,98,51,.12)}

  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:26px;gap:14px}
  .back{background:none;border:0;color:var(--ink-soft);font-family:"Sora";font-weight:600;font-size:.95rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;padding:.6rem .2rem;transition:color .2s}
  .back:hover{color:var(--ink)}
  .back svg{width:16px;height:16px}
  .back[disabled]{opacity:0;pointer-events:none}
  .next{font-family:"Sora";font-weight:700;font-size:1.05rem;background:var(--green);color:var(--cream);border:0;border-radius:999px;
    padding:.95rem 1.7rem;cursor:pointer;display:inline-flex;align-items:center;gap:.5rem;box-shadow:0 14px 30px -14px rgba(0,98,51,.7);transition:background .2s,transform .15s,opacity .2s}
  .next:hover{background:var(--green-deep);transform:translateY(-2px)}
  .next svg{width:18px;height:18px}
  .next[disabled]{opacity:.4;pointer-events:none;box-shadow:none}

  /* booking */
  .days{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .day{flex:none;min-width:78px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:.8rem .6rem;text-align:center;cursor:pointer;transition:.18s}
  .day:hover{border-color:var(--green);transform:translateY(-1px)}
  .day.sel{border-color:var(--green);background:rgba(0,98,51,.06);box-shadow:0 0 0 3px rgba(0,98,51,.1)}
  .day .wd{font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--terracotta)}
  .day .dn{font-family:"Sora";font-weight:800;font-size:1.5rem;line-height:1.1;margin:.15rem 0}
  .day .mo{font-size:.74rem;color:var(--ink-soft);font-weight:600}
  .slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:10px;margin-top:18px}
  .slots.empty{opacity:.45;pointer-events:none}
  .slot{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:.8rem .5rem;font-family:"Sora";font-weight:700;font-size:1rem;cursor:pointer;transition:.18s;text-align:center}
  .slot:hover{border-color:var(--green);transform:translateY(-1px)}
  .slot.sel{border-color:var(--green);background:var(--green);color:var(--cream)}
  .slots-label{font-size:.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 8px}
  .slots-label.hide{display:none}

  /* final */
  .done-step{text-align:center;display:none}
  .done-step.active{display:block;animation:fade .4s ease}
  .done-step .seal{width:74px;height:74px;border-radius:20px;background:var(--green);display:grid;place-items:center;margin:0 auto 1.3rem;box-shadow:inset 0 0 0 2px rgba(212,168,83,.5)}
  .done-step .seal svg{width:36px;height:36px}
  .done-step .ar{color:var(--terracotta);font-size:1.5rem}
  .done-step h2{font-size:clamp(1.6rem,4.5vw,2.3rem);margin:.4rem 0 .7rem}
  .done-step .recap{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;max-width:420px;margin:0 auto 1.4rem;box-shadow:var(--shadow-sm);text-align:left}
  .done-step .recap .rrow{display:flex;align-items:center;gap:12px;padding:.4rem 0}
  .done-step .recap .rrow svg{width:20px;height:20px;color:var(--green);flex:none}
  .done-step .recap .rrow b{font-family:"Sora"}
  .done-step .recap .rrow span{color:var(--ink-soft);font-size:.92rem}
  .done-step p.note{color:var(--ink-soft);max-width:38ch;margin:0 auto 1.6rem;font-size:.95rem}

  footer{padding:24px 22px 36px;text-align:center}
  .disc{max-width:640px;margin:0 auto;font-size:.76rem;color:var(--ink-soft);line-height:1.55}

  @media(min-width:760px){ main{padding:42px 22px 80px} }
</style>
</head>
<body>

<div class="top">
  <a class="brand" href="index.html">
    <span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L21 12 L12 22 L3 12 Z" stroke="#D4A853" stroke-width="1.5"/><path d="M12 7 L17 12 L12 17 L7 12 Z" fill="#F5F0E8"/></svg></span>
    Darija&nbsp;Mastery <span class="ar">دارجة</span>
  </span>
</div>

<div class="progress">
  <div class="pbar"><i id="pbar"></i></div>
  <div class="pmeta"><span id="pstep">Question 1</span><span id="pname"></span></div>
</div>

<main>
  <div class="quiz" id="quiz">
    <!-- steps injected -->
  </div>
</main>

<footer>
  <p class="disc">Tes réponses servent uniquement à préparer ton appel de sélection. Aucune donnée n'est partagée — zéro spam.</p>
</footer>

<script>
  const qp=new URLSearchParams(location.search);
  const name=(qp.get('first_name')||'').trim();
  const email=(qp.get('email')||'').trim();
  if(name) document.getElementById('pname').textContent = name;

  const QUESTIONS=[
    { id:'niveau', kicker:'Ton point de départ', q:'Quel est ton niveau en darija&nbsp;?',
      opts:[
        "Débutant — je ne sais pas parler",
        "Je comprends, mais je ne sais pas parler",
        "Je dis quelques mots, mais pas une vraie discussion"
      ]},
    { id:'delai', kicker:'Ton objectif', q:'Dans combien de temps aimerais-tu savoir parler&nbsp;?',
      opts:["Un mois","3 mois","6 mois","12 mois"]},
    { id:'pourquoi', kicker:'Ta motivation', q:'Pourquoi veux-tu apprendre la darija&nbsp;?',
      opts:[
        "Pour parler avec ma famille en Algérie",
        "Pour ne plus être « l'immigré »",
        "Parce que je veux m'installer en Algérie",
        "Autre — écris ta réponse"
      ], other:3 },
    { id:'investir', kicker:'Ton engagement', q:'Combien de temps es-tu prêt(e) à investir chaque jour&nbsp;?',
      opts:[
        "10 à 15 min par jour",
        "30 min par jour",
        "1 heure par jour",
        "Le maximum — je suis motivé(e)"
      ]}
  ];

  const answers={};
  const quiz=document.getElementById('quiz');
  const intro=document.getElementById('intro');
  const pbar=document.getElementById('pbar');
  const pstep=document.getElementById('pstep');

  // build question steps
  QUESTIONS.forEach((Q,qi)=>{
    const step=document.createElement('div');
    step.className='step'; step.dataset.i=qi;
    const optsHtml=Q.opts.map((o,oi)=>`
      <button type="button" class="opt" data-q="${qi}" data-o="${oi}">
        <span class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
        <span class="otxt">${o}</span>
      </button>`).join('');
    const hasOther = (Q.other!==undefined);
    step.innerHTML=`
      <div class="kicker">${Q.kicker}</div>
      <h2 class="q">${Q.q}</h2>
      <div class="opts">${optsHtml}</div>
      ${hasOther?`<div class="otherwrap" data-q="${qi}"><textarea placeholder="Écris ta réponse ici…"></textarea></div>`:''}
      <div class="nav">
        <button type="button" class="back" ${qi===0?'disabled':''}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
          Retour
        </button>
        <button type="button" class="next" disabled>Continuer
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`;
    quiz.appendChild(step);
  });

  // booking step
  const QN=QUESTIONS.length;
  const booking=document.createElement('div');
  booking.className='step'; booking.dataset.i=QN;
  booking.innerHTML=`
    <div class="kicker">Dernière étape</div>
    <h2 class="q">Choisis ton créneau d'appel <span class="ar">موعد</span></h2>
    <div class="days" id="days"></div>
    <div class="slots-label hide" id="slotsLabel">Horaire disponible</div>
    <div class="slots empty" id="slots"></div>
    <div class="nav">
      <button type="button" class="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
        Retour
      </button>
      <button type="button" class="next" id="confirm" disabled>Confirmer mon appel
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>`;
  quiz.appendChild(booking);

  // confirmation
  const done=document.createElement('div');
  done.className='done-step';
  quiz.appendChild(done);

  const steps=[...quiz.querySelectorAll('.step')]; // questions + booking
  const total=steps.length; // QN + 1

  function show(i){
    steps.forEach(s=>s.classList.remove('active'));
    done.classList.remove('active');
    if(intro) intro.classList.toggle('hide', i>=QN); // hide intro on booking + done
    if(i<total){
      steps[i].classList.add('active');
      pstep.textContent = (i<QN) ? ('Question '+(i+1)+' / '+QN) : 'Ton créneau';
      pbar.style.width=(i/total)*100+'%';
    }else{
      done.classList.add('active');
      pstep.textContent='Réservé';
      pbar.style.width='100%';
    }
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function goNext(i){ show(i+1); }

  // ---- questions interaction ----
  quiz.addEventListener('click',e=>{
    const opt=e.target.closest('.opt');
    const next=e.target.closest('.next');
    const back=e.target.closest('.back');

    if(opt){
      const qi=+opt.dataset.q, oi=+opt.dataset.o;
      const step=steps[qi];
      step.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      opt.classList.add('sel');
      const Q=QUESTIONS[qi];
      const isOther=(Q.other===oi);
      const ow=step.querySelector('.otherwrap');
      if(ow) ow.classList.toggle('show', isOther);
      step.querySelector('.next').disabled=false;
      answers[Q.id]= isOther ? (ow.querySelector('textarea').value.trim()||'Autre') : Q.opts[oi];
      if(isOther){ ow.querySelector('textarea').focus(); }
      else { setTimeout(()=>{ if(opt.classList.contains('sel')) goNext(qi); }, 360); }
      return;
    }
    if(back){ const i=+back.closest('.step').dataset.i; if(i>0) show(i-1); return; }
    if(next && next.id==='confirm'){ finish(); return; }
    if(next){ goNext(+next.closest('.step').dataset.i); }
  });

  quiz.addEventListener('input',e=>{
    if(e.target.matches('.otherwrap textarea')){
      const qi=+e.target.closest('.otherwrap').dataset.q;
      answers[QUESTIONS[qi].id]=e.target.value.trim()||'Autre';
    }
  });

  // ---- booking interaction ----
  const WD=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const WDS=['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
  const MO=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  const MOL=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const SLOTS=['10:00','11:30','14:00','16:00','18:30'];
  const daysEl=document.getElementById('days');
  const slotsEl=document.getElementById('slots');
  const slotsLabel=document.getElementById('slotsLabel');
  const confirmBtn=document.getElementById('confirm');
  let selDay=null, selSlot=null;

  // next 6 days starting tomorrow
  const today=new Date();
  for(let k=1;k<=6;k++){
    const d=new Date(today); d.setDate(today.getDate()+k);
    const btn=document.createElement('button');
    btn.type='button'; btn.className='day';
    btn.dataset.iso=d.toISOString();
    btn.dataset.label=WD[d.getDay()]+' '+d.getDate()+' '+MOL[d.getMonth()];
    btn.innerHTML=`<div class="wd">${WDS[d.getDay()]}</div><div class="dn">${d.getDate()}</div><div class="mo">${MO[d.getMonth()]}</div>`;
    daysEl.appendChild(btn);
  }

  function renderSlots(){
    slotsLabel.classList.remove('hide');
    slotsEl.classList.remove('empty');
    slotsEl.innerHTML=SLOTS.map(s=>`<button type="button" class="slot" data-s="${s}">${s}</button>`).join('');
  }

  daysEl.addEventListener('click',e=>{
    const d=e.target.closest('.day'); if(!d) return;
    daysEl.querySelectorAll('.day').forEach(x=>x.classList.remove('sel'));
    d.classList.add('sel');
    selDay=d.dataset.label; selSlot=null;
    renderSlots();
    confirmBtn.disabled=true;
  });

  slotsEl.addEventListener('click',e=>{
    const s=e.target.closest('.slot'); if(!s) return;
    slotsEl.querySelectorAll('.slot').forEach(x=>x.classList.remove('sel'));
    s.classList.add('sel');
    selSlot=s.dataset.s;
    confirmBtn.disabled=false;
  });

  function finish(){
    const creneau = selDay+' à '+selSlot;
    answers.creneau=creneau;
    done.innerHTML=`
      <div class="seal"><svg viewBox="0 0 24 24" fill="none" stroke="#F5F0E8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span class="ar">مبروك</span>
      <h2>${name?("C'est noté, "+name+"\u00a0!"):"C'est noté\u00a0!"}</h2>
      <div class="recap">
        <div class="rrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><div><b>${creneau.charAt(0).toUpperCase()+creneau.slice(1)}</b><br><span>Appel de sélection · 20 min</span></div></div>
        <div class="rrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg><div><b>Confirmation par email</b><br><span>${email||"à l'adresse fournie"}</span></div></div>
      </div>
      <p class="note">On t'appelle à l'heure choisie pour voir ensemble si la méthode est faite pour toi. À très vite&nbsp;!</p>
      <button type="button" class="next" id="ics">Ajouter à mon agenda
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>`;
    show(total); // done
    document.getElementById('ics').addEventListener('click',()=>{
      alert('Créneau réservé : '+creneau+'\n(démo — branche ici Calendly / ton agenda)');
    });
  }

  show(0);
</script>
</body>
</html>
